# Légende des champs (SCARLET schema YAML)
# - `schema.*` : métadonnées (name, version, profile, entry_path)
# - `conventions.*` : conventions générales (axes, unités, notes)
# - `nodes` : liste de nœuds attendus dans le NeXus
#   - `path` : chemin absolu du nœud (groupe/dataset)
#   - `path_pattern` : regex (Python) pour matcher plusieurs chemins
#   - `kind` : "group" ou "dataset"
#   - `nx_class` : `NX_class` attendu pour un groupe (optionnel)
#   - `required` : booléen (doit exister / optionnel)
#   - `const` : valeur imposée (dataset) si présent
#   - `children` : sous-structure relative sous ce groupe
#   - `rules` : contraintes additionnelles, typiquement :
#     - `required_datasets` / `optional_datasets` : datasets requis / optionnels dans le groupe
#     - `required_groups` / `optional_groups` : sous-groupes requis / optionnels
#     - `required_in_group` : datasets requis dans un sous-groupe nommé (ex. `transformations: [translation]`)
#     - `allowed_nx_classes` : liste de `NX_class` autorisés (utile avec `path_pattern`)
#     - `conditional_rules` : règles conditionnelles selon `NX_class` (`apply_if_nx_class`)
#     - `enums` : valeurs autorisées pour un dataset (clé -> liste)
#     - `booleans` : datasets attendus comme bool
#     - `one_of` : alternatives (au moins un des ensembles de datasets doit exister)
#     - `linked_axis_if_present` : si un dataset existe, imposer la présence d’un axis associé
#     - `recommended_datasets` / `recommended_attrs` : champs recommandés (non bloquants)
#     - `link_targets` : liens attendus (ex. dans NXdata) (dataset -> regex de chemin cible)

schema:
  name: SCARLET NXsas_raw
  version: "1.3"
  profile: "mono"   # monochromatic (no TOF)
  entry_path: /entry

conventions:
  geometry_origin: sample center
  axes: "+z downstream, +x beam-right, +y up"
  units_length: m
  units_angle: deg
  notes: >
    In v1.3, aperture1/aperture2 are derived from element_order and guide states.
    collimation_distance may be computed from NXtransformations of derived apertures.
    last_aperture_to_sample_distance must be provided by the converter (from original instrument data).

nodes:

  # ---------------- Entry ----------------
  - path: /entry
    kind: group
    nx_class: NXentry
    required: true

  - path: /entry/definition
    kind: dataset
    required: true
    const: "NXsas_raw"

  - path: /entry/schema_version
    kind: dataset
    required: false
    const: "1.3"

  - path: /entry/sample
    kind: group
    nx_class: NXsample
    required: true

  - path: /entry/instrument
    kind: group
    nx_class: NXinstrument
    required: true

  # ---------------- Geometry ----------------
  - path: /entry/instrument/geometry
    kind: group
    required: true
    recommended_datasets:
      - origin_definition
      - axis_convention

  # ---------------- Source (optional) ----------------
  - path: /entry/instrument/source
    kind: group
    nx_class: NXsource
    required: false

  # ---------------- Monochromator (required, mono profile) ----------------
  - path: /entry/instrument/monochromator
    kind: group
    nx_class: NXmonochromator
    required: true
    rules:
      required_datasets:
        - wavelength
      optional_datasets:
        - wavelength_error
    children:
      - path: velocity_selector
        kind: group
        nx_class: NXvelocity_selector
        required: false

  # ---------------- Collimation (authoritative chain) ----------------
  - path: /entry/instrument/collimation
    kind: group
    required: true
    rules:
      required_datasets:
        - collimation_distance
        - last_aperture_to_sample_distance
      optional_datasets:
        - element_order


  - path: /entry/instrument/collimation/elements
    kind: group
    required: false

  - path_pattern: '^/entry/instrument/collimation/elements/[^/]+$'
    kind: group
    required: false
    rules:
      required_groups:
        - transformations
      required_in_group:
        transformations:
          - translation
      allowed_nx_classes:
        - NXslit
        - NXpinhole
        - NXaperture
        - NXguide
      conditional_rules:
        - apply_if_nx_class: NXguide
          required_datasets:
            - state
          enums:
            state: ["in", "out"]
        - apply_if_nx_class: NXslit
          required_datasets:
            - x_gap
            - y_gap
        - apply_if_nx_class: NXpinhole
          required_datasets:
            - diameter

  # Required derived snapshots
  - path: /entry/instrument/collimation/aperture1
    kind: group
    required: true
    rules:
      allowed_nx_classes: [NXslit, NXpinhole]
      conditional_rules:
        - apply_if_nx_class: NXslit
          required_datasets: [x_gap, y_gap]
        - apply_if_nx_class: NXpinhole
          required_datasets: [diameter]

  - path: /entry/instrument/collimation/aperture2
    kind: group
    required: true
    rules: 
      allowed_nx_classes: [NXslit, NXpinhole]
      conditional_rules:
        - apply_if_nx_class: NXslit
          required_datasets: [x_gap, y_gap]
        - apply_if_nx_class: NXpinhole
          required_datasets: [diameter]

  # ---------------- Beamstop (optional) ----------------
  - path: /entry/instrument/beamstop
    kind: group
    nx_class: NXbeamstop
    required: false

  # ---------------- Detectors ----------------
  - path_pattern: '^/entry/instrument/detector\d+$'
    kind: group
    nx_class: NXdetector
    required: true
    rules:
      required_datasets:
        - data
        - x_pixel_size
        - y_pixel_size
        - beam_center_x
        - beam_center_y
        - dead_time
      required_groups:
        - transformations
      required_in_group:
        transformations: [translation]
      optional_datasets:
        - data_errors
        - local_name
        - type
        - pixel_mask
        - pixel_mask_applied
        - countrate_correction_applied
        - flatfield
        - flatfield_applied
        - efficiency
        - wavelength          # only if efficiency depends on wavelength
        - distance
        - x_pixel_offset
        - y_pixel_offset
        - z_pixel_offset
      booleans:
        - pixel_mask_applied
        - countrate_correction_applied
        - flatfield_applied
      linked_axis_if_present:
        efficiency: wavelength

  # ---------------- Monitors ----------------
  - path: /entry/control
    kind: group
    nx_class: NXmonitor
    required: True
    rules:
      required_datasets: [mode, preset]
      one_of:
        - [integral]
        - [data]
      enums:
        mode: ["monitor", "timer"]

  - path_pattern: '^/entry/instrument/monitor\d+$'
    kind: group
    nx_class: NXmonitor
    required: false
    rules:
      required_datasets: [mode, preset]
      one_of:
        - [integral]
        - [data]
      enums:
        mode: ["monitor", "timer"]

  # ---------------- NXdata Views ----------------
  - path_pattern: '^/entry/data\d+$'
    kind: group
    nx_class: NXdata
    required: true
    rules:
      required_datasets: [counts]
      optional_datasets: [counts_errors]
      recommended_attrs: [signal, axes]
      link_targets:
        counts: '^/entry/instrument/detector\d+/data$'
        counts_errors: '^/entry/instrument/detector\d+/data_errors$'
