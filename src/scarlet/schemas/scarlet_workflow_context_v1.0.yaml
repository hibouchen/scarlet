schema:
  name: SCARLET_workflow_context
  version: "1.0"
  profile: "mono"
  entry_path: /entry

conventions:
  mask_convention: "1=masked, 0=valid"
  transmission_roi_convention: "x1 and y1 are exclusive"

nodes:

  - path: /entry
    kind: group
    nx_class: NXentry
    required: true

  - path: /entry/definition
    kind: dataset
    required: true
    const: "SCARLET_workflow_context"

  - path: /entry/schema_version
    kind: dataset
    required: true
    const: "1.0"

  - path: /entry/metadata
    kind: group
    required: true
    rules:
      required_datasets:
        - experiment_id
        - instrument_name
        - root_dir
        - output_dir
        - created_utc
      optional_datasets:
        - scarlet_version
        - schema_raw
        - schema_refs_sub
        - schema_refs_norm
        - schema_masks

  - path: /entry/runs
    kind: group
    required: true
    rules:
      required_datasets:
        - sample_name
        - config_id
        - mode
        - entity
        - duplicate_index
        - file_path

  - path: /entry/configurations
    kind: group
    required: true

  - path_pattern: ^/entry/configurations/[^/]+$
    kind: group
    required: false
    rules:
      required_datasets:
        - wavelength
        - sample_detector_distance
      optional_datasets:
        - config_id
        - notes
      optional_groups:
        - collimation

  - path_pattern: ^/entry/configurations/[^/]+/collimation$
    kind: group
    required: false
    rules:
      optional_datasets:
        - collimation_distance
        - last_aperture_to_sample_distance
      optional_groups:
        - aperture1
        - aperture2

  - path_pattern: ^/entry/configurations/[^/]+/collimation/aperture[12]$
    kind: group
    required: false
    rules:
      required_datasets:
        - type
      optional_datasets:
        - x_gap
        - y_gap
        - diameter

  - path: /entry/beam_centers
    kind: group
    required: false

  - path_pattern: ^/entry/beam_centers/[^/]+/detector\d+$
    kind: group
    required: false
    rules:
      required_datasets:
        - beam_center_x
        - beam_center_y

  - path: /entry/rois
    kind: group
    required: false

  - path_pattern: ^/entry/rois/[^/]+$
    kind: group
    required: false
    rules:
      required_datasets:
        - x0
        - x1
        - y0
        - y1
      optional_datasets:
        - detector_number
        - method
        - notes

  - path: /entry/references
    kind: group
    required: false

  - path: /entry/references/dark
    kind: group
    required: false

  - path_pattern: ^/entry/references/dark/[^/]+$
    kind: dataset
    required: false

  - path: /entry/references/empty_beam
    kind: group
    required: false

  - path_pattern: ^/entry/references/empty_beam/[^/]+$
    kind: group
    required: false
    rules:
      optional_datasets:
        - scattering
        - transmission

  - path: /entry/references/empty_cell
    kind: group
    required: false

  - path_pattern: ^/entry/references/empty_cell/[^/]+$
    kind: group
    required: false
    rules:
      optional_datasets:
        - scattering
        - transmission

  - path: /entry/references/water
    kind: group
    required: false

  - path_pattern: ^/entry/references/water/[^/]+$
    kind: group
    required: false
    rules:
      optional_datasets:
        - scattering
        - transmission

  - path: /entry/references/mask_files
    kind: group
    required: false

  - path_pattern: ^/entry/references/mask_files/[^/]+$
    kind: dataset
    required: false

  - path: /entry/references/flatfields
    kind: group
    required: false

  - path_pattern: ^/entry/references/flatfields/[^/]+$
    kind: dataset
    required: false

  - path: /entry/transmissions
    kind: group
    required: true

  - path: /entry/transmissions/sample
    kind: group
    required: false
    rules:
      required_datasets:
        - sample_name
        - config_id
        - value

  - path: /entry/transmissions/empty_cell
    kind: group
    required: false
    rules:
      required_datasets:
        - config_id
        - value

  - path: /entry/sample_thicknesses
    kind: group
    required: false

  - path: /entry/sample_thicknesses/sample
    kind: group
    required: false
    rules:
      required_datasets:
        - sample_name
        - config_id
        - value

  - path: /entry/masks
    kind: group
    required: true

  - path_pattern: ^/entry/masks/[^/]+/detector\d+$
    kind: dataset
    required: false

  - path: /entry/flatfield_sources
    kind: group
    required: false

  - path_pattern: ^/entry/flatfield_sources/[^/]+$
    kind: dataset
    required: false

  - path: /entry/stale_flatfields
    kind: group
    required: false

  - path_pattern: ^/entry/stale_flatfields/[^/]+$
    kind: dataset
    required: false

  - path: /entry/artifacts
    kind: group
    required: true
    rules:
      required_datasets:
        - name
        - path
        - kind
        - created_utc

  - path: /entry/logs
    kind: group
    required: true
    rules:
      required_datasets:
        - level
        - message
        - where
        - when_utc
        - meta_json

  - path: /entry/issues
    kind: group
    required: true
    rules:
      required_datasets:
        - level
        - message
        - where
        - key
        - when_utc
        - meta_json

  - path: /entry/timings
    kind: group
    required: true

  - path: /entry/store
    kind: group
    required: true
