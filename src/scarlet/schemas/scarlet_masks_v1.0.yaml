schema:
  name: SCARLET_masks
  version: "1.0"
  profile: "mono"
  entry_path: /entry

conventions:
  units_length: m
  units_wavelength: angstrom
  mask_convention: "1=masked, 0=valid"

nodes:

  - path: /entry
    kind: group
    nx_class: NXentry
    required: true

  - path: /entry/definition
    kind: dataset
    required: true
    const: "SCARLET_masks"

  - path: /entry/schema_version
    kind: dataset
    required: true
    const: "1.0"

  - path: /entry/config_id
    kind: dataset
    required: false

  - path: /entry/configuration
    kind: group
    required: true
    rules:
      optional_datasets:
        - wavelength
        - sample_detector_distance
        - notes
      optional_groups:
        - collimation

  - path: /entry/configuration/collimation
    kind: group
    required: false
    rules:
      required_datasets:
        - collimation_distance
        - last_aperture_to_sample_distance
      required_groups:
        - aperture1
        - aperture2

  - path: /entry/configuration/collimation/aperture1
    kind: group
    required: false
    rules:
      allowed_nx_classes:
        - NXslit
        - NXpinhole
      conditional_rules:
        - apply_if_nx_class: NXslit
          required_datasets:
            - x_gap
            - y_gap
        - apply_if_nx_class: NXpinhole
          required_datasets:
            - diameter

  - path: /entry/configuration/collimation/aperture2
    kind: group
    required: false
    rules:
      allowed_nx_classes:
        - NXslit
        - NXpinhole
      conditional_rules:
        - apply_if_nx_class: NXslit
          required_datasets:
            - x_gap
            - y_gap
        - apply_if_nx_class: NXpinhole
          required_datasets:
            - diameter

  - path: /entry/mask
    kind: group
    required: true

  - path_pattern: ^/entry/mask/mask_detector\d+$
    kind: dataset
    required: false

  - path: /entry/meta
    kind: group
    required: true
    rules:
      required_datasets:
        - created_utc
        - mask_convention
        - source_file
        - source_entry_path
      optional_datasets:
        - configuration_issues
